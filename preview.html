<title>2025 March Madness Player Pool — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #030712; color: #f3f4f6; }
  .header { background: #111827; border-bottom: 1px solid #1f2937; padding: 16px; }
  .header h1 { font-size: 1.35rem; color: #fb923c; }
  .header .sub { font-size: 0.8rem; color: #9ca3af; margin-top: 4px; }
  .max-w { max-width: 900px; margin: 0 auto; }
  .tabs { background: #111827; border-bottom: 1px solid #1f2937; position: sticky; top: 0; z-index: 10; }
  .tabs button { padding: 12px 16px; font-size: 0.875rem; font-weight: 500; background: none; border: none; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabs button.active { color: #fb923c; border-bottom-color: #fb923c; }
  .tabs button:hover { color: #e5e7eb; }
  .content { padding: 16px; }
  table { width: 100%; font-size: 0.875rem; border-collapse: collapse; }
  th { text-align: left; color: #9ca3af; padding: 8px 12px; border-bottom: 1px solid #1f2937; font-weight: 500; }
  th.r { text-align: right; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(31,41,55,0.5); }
  td.r { text-align: right; }
  .rank { font-family: monospace; color: #6b7280; }
  .name { font-weight: 600; }
  .pts { font-weight: 700; font-size: 1.05rem; font-variant-numeric: tabular-nums; }
  .gold { background: rgba(161,98,7,0.12); }
  .silver { background: rgba(107,114,128,0.1); }
  .bronze { background: rgba(180,83,9,0.06); }
  .green { color: #4ade80; }
  .gray { color: #6b7280; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; }
  .card-header:hover { background: rgba(31,41,55,0.5); }
  .card-header .left { display: flex; align-items: center; gap: 10px; }
  .card-header .rank-sm { font-size: 0.75rem; font-family: monospace; color: #6b7280; width: 22px; }
  .card-header .owner-name { font-weight: 600; }
  .card-header .owner-pts { color: #fb923c; font-weight: 700; }
  .card-body { border-top: 1px solid #1f2937; display: none; }
  .card.open .card-body { display: block; }
  .arrow { color: #6b7280; transition: transform 0.2s; font-size: 0.75rem; }
  .card.open .arrow { transform: rotate(180deg); }
  .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
  .badge-out { color: rgba(248,113,113,0.8); background: rgba(127,29,29,0.2); }
  .badge-active { color: rgba(74,222,128,0.8); background: rgba(20,83,45,0.2); }
  .pick { font-size: 0.7rem; color: #4b5563; }
  .team-col { color: #9ca3af; font-size: 0.75rem; }
  select { background: #1f2937; border: 1px solid #374151; color: #e5e7eb; padding: 8px 12px; border-radius: 6px; font-size: 0.875rem; margin-bottom: 16px; }
  .small { font-size: 0.75rem; color: #6b7280; }
  @media (max-width: 640px) {
    .hide-mobile { display: none; }
    .mobile-sub { font-size: 0.7rem; color: #6b7280; }
  }
</style>
</head>

// --- RENDER STANDINGS ---
function renderStandings() {
  const tbody = document.getElementById('standings-body');
  tbody.innerHTML = owners.map((o, i) => {
    const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    return `<tr class="${cls}">
      <td class="rank">${o.rank}</td>
      <td><div class="name">${o.name}</div><div class="mobile-sub hide-desktop">${o.playersRemaining} remaining | ${o.avgPPG} ppg</div></td>
      <td class="r pts">${o.totalPoints}</td>
      <td class="r hide-mobile"><span class="${o.playersRemaining > 0 ? 'green' : 'gray'}">${o.playersRemaining}</span></td>
      <td class="r hide-mobile" style="font-variant-numeric:tabular-nums;color:#d1d5db">${o.avgPPG}</td>
    </tr>`;
  }).join('');
}

// --- RENDER ROSTERS ---
function renderRosters() {
  const container = document.getElementById('rosters');
  container.innerHTML = owners.map(o => {
    const rows = o.players.map(p => `
      <tr>
        <td style="padding:8px 16px">
          <div>${p.name} <span class="pick">#${p.pick}</span></div>
          <div class="small hide-desktop">${p.team}</div>
        </td>
        <td class="hide-mobile team-col">${p.team}</td>
        <td class="r" style="font-weight:500;font-variant-numeric:tabular-nums">${p.totalPoints}</td>
        <td class="r gray" style="font-variant-numeric:tabular-nums">${p.gamesPlayed}</td>
        <td class="r">${p.eliminated
          ? '<span class="badge badge-out">Out</span>'
          : '<span class="badge badge-active">Active</span>'}</td>
      </tr>`).join('');

    return `<div class="card open" onclick="this.classList.toggle('open')">
      <div class="card-header">
        <div class="left">
          <span class="rank-sm">#${o.rank}</span>
          <span class="owner-name">${o.name}</span>
          <span class="owner-pts">${o.totalPoints} pts</span>
        </div>
        <span class="arrow">&#9660;</span>
      </div>
      <div class="card-body">
        <table>
          <thead><tr>
            <th style="padding-left:16px">Player</th>
            <th class="hide-mobile">Team</th>
            <th class="r">Pts</th>
            <th class="r">GP</th>
            <th class="r">Status</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

// --- RENDER GAME LOG (simplified — no per-game data, shows totals) ---
function renderGameLog() {
  const filter = document.getElementById('owner-filter').value;
  const allRows = [];
  owners.forEach(o => {
    o.players.forEach(p => {
      if (filter === 'all' || filter === o.name) {
        allRows.push({ player: p.name, owner: o.name, team: p.team, points: p.totalPoints, gp: p.gamesPlayed });
      }
    });
  });
  allRows.sort((a, b) => b.points - a.points);

  const tbody = document.getElementById('gamelog-body');
  tbody.innerHTML = allRows.map(r => `
    <tr>
      <td><div>${r.player}</div><div class="small hide-desktop">${r.owner}</div></td>
      <td class="hide-mobile gray">${r.owner}</td>
      <td class="small">${r.team}</td>
      <td class="hide-mobile gray">${r.gp} games</td>
      <td class="r" style="font-weight:600;font-variant-numeric:tabular-nums">${r.points}</td>
    </tr>`).join('');
}

// --- TAB SWITCHING ---
function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// --- INIT ---

renderRosters();

// Populate owner filter dropdown
const sel = document.getElementById('owner-filter');
owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.name; opt.textContent = o.name; sel.appendChild(opt); });
renderGameLog();
</script>
